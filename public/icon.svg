<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="lens-outer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="48" y="128" width="416" height="320" rx="48" ry="48" fill="url(#body)" stroke="#444" stroke-width="3"/>
  <!-- Flash/viewfinder bump -->
  <rect x="176" y="80" width="160" height="80" rx="24" ry="24" fill="url(#body)" stroke="#444" stroke-width="3"/>
  <!-- Small dot (flash indicator) -->
  <circle cx="408" cy="192" r="16" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <!-- Lens outer ring - Neon Amber -->
  <circle cx="256" cy="304" r="128" fill="none" stroke="#FFBF00" stroke-width="6"/>
  <!-- Lens body -->
  <circle cx="256" cy="304" r="120" fill="url(#lens-outer)"/>
  <!-- Lens inner ring -->
  <circle cx="256" cy="304" r="100" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <!-- Smiley face - eyes -->
  <rect x="212" y="264" width="16" height="20" rx="2" fill="#FFBF00"/>
  <rect x="284" y="264" width="16" height="20" rx="2" fill="#FFBF00"/>
  <!-- Smiley face - mouth -->
  <path d="M 208 328 Q 256 376 304 328" fill="none" stroke="#FFBF00" stroke-width="10" stroke-linecap="round"/>
</svg>
